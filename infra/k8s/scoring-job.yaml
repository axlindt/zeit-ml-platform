apiVersion: batch/v1
kind: Job
metadata:
  name: churn-scoring
  namespace: mlflow
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: churn-scoring
          image: zeit-churn-model:latest
          imagePullPolicy: Never
          env:
            - name: MODE
              value: "score"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: SCORE_DATA_PATH
              value: "s3://ml-data/scoring_data.csv"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio:9000"
            # Credentials werden benötigt um Scoring-Daten aus MinIO zu lesen.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
            # Optional: spezifische Run ID angeben, sonst wird der letzte Training Run genutzt
            # - name: MODEL_RUN_ID
            #   value: "deine-run-id-hier"
